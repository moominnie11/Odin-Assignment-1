<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nowsy: Create Account</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="content">
        <div class="hero">
            <div class="bg-image">
                <img src="images/background- image.jpg" style="width: 100%; height: 100vh;">
            </div>
            <div class="credits">
                <p>Image by <a href="https://unsplash.com/@luiseandnic">Luise and Nic</a> from <a href="https://unsplash.com/">Unsplash</a></p>
            </div>
        </div>
        
        <div class="sign-up-form">

            <div class="form-heading"><h2><b>Nowsy: A Friendly Archive</b></h2></div>
            <form class="main-form" action="index.html" method="post">
                <div class="grid-container">
                    <div class="form-grid">
                        <div class="label-input">
                            <div class="form-label"><label for="first-name">First Name</label></div>
                            <div class="form-input"><input type="text" id="first-name" name="first-name" placeholder="Blue" required></div>
                        </div>
                
                        <div class="label-input">
                            <div class="form-label"><label for="last-name">Last Name</label></div>
                            <div class="form-input"><input type="text" id="last-name" name="last-name" placeholder="Sargent" required></div>
                        </div>
                    </div>
                
                    <div class="form-grid">

                        <div class="label-input">
                         <div class="form-label"><label for="phone-number">Phone Number</label></div>
                         <div class="form-input"><input type="text" id="phone-number" name="phone-number" placeholder="(xxx)-xxx-xxxx" required></div>
                        </div>
                
                        <div class="label-input">
                            <div class="form-label"><label for="user-email">Email</label></div>
                            <div class="form-input"><input type="email" id="user-email" name="user-email" placeholder="halftree@gmail.com" required></div>
                        </div>

                    </div>
               
                    <div class="form-grid">

                        <div class="label-input">
                            <div class="form-label"><label for="user-password">Password</label></div>
                         <div class="form-input"><input type="password" id="user-password" name="user-password" placeholder="password" required></div>
                        </div>
                
                        <div class="label-input">
                            <div class="form-label"><label for="confirm-password">Confirm Password</label></div>
                            <div class="form-input"><input type="password" id="confirm-password" name="confirm-password" placeholder="password" required></div>
                        </div>

                    </div>

                </div>
                
                

                <div class="form-button">
                    <button type="submit">Create Account</button>
                </div>

                <div class="button-cc">
                    <p>Already have an acccount?<a href="loginpage.html">Log In</a></p>
                </div>
            </form>
            
        </div>

        
    </main>
</body>
</html>
